{% extends "base.html" %}
{% block titulo %}Paciente{% endblock %}

{% block conteudo %}
<h3 class="mb-4"><i class="bi bi-person-plus"></i> {{ 'Editar' if paciente.id else 'Novo' }} paciente</h3>

<form method="post" class="card shadow-sm">
  <div class="card-body row g-3">
    <div class="col-md-8">
      <label class="form-label">Nome *</label>
      <input type="text" name="nome" class="form-control" required value="{{ paciente.nome or '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">CPF</label>
      <input type="text" name="cpf" class="form-control" value="{{ paciente.cpf or '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Data de nascimento</label>
      <input type="date" name="data_nascimento" class="form-control"
             value="{{ paciente.data_nascimento.strftime('%Y-%m-%d') if paciente.data_nascimento else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Telefone</label>
      <input type="text" name="telefone" class="form-control" value="{{ paciente.telefone or '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">E-mail</label>
      <input type="email" name="email" class="form-control" value="{{ paciente.email or '' }}">
    </div>
    <div class="col-12">
      <label class="form-label">Observacoes</label>
      <textarea name="observacoes" class="form-control" rows="3">{{ paciente.observacoes or '' }}</textarea>
    </div>
  </div>
  <div class="card-footer bg-white d-flex gap-2">
    <button class="btn btn-primary"><i class="bi bi-check-lg"></i> Salvar</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('pacientes.listar') }}">Cancelar</a>
  </div>
</form>
{% endblock %}
