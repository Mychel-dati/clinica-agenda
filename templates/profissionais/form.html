{% extends "base.html" %}
{% block titulo %}Profissional{% endblock %}

{% block conteudo %}
<h3 class="mb-4"><i class="bi bi-person-badge"></i> {{ 'Editar' if profissional.id else 'Novo' }} profissional</h3>

<form method="post" class="card shadow-sm">
  <div class="card-body row g-3">
    <div class="col-md-8">
      <label class="form-label">Nome *</label>
      <input type="text" name="nome" class="form-control" required value="{{ profissional.nome or '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Registro (CRM/CRO/CRP)</label>
      <input type="text" name="registro" class="form-control" value="{{ profissional.registro or '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">Especialidade</label>
      <input type="text" name="especialidade" class="form-control" value="{{ profissional.especialidade or '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Cor na agenda</label>
      <input type="color" name="cor" class="form-control form-control-color" value="{{ profissional.cor or '#0d6efd' }}">
    </div>
    <div class="col-md-3 d-flex align-items-end">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="ativo" id="ativo" {{ 'checked' if profissional.ativo or profissional.id is none }}>
        <label class="form-check-label" for="ativo">Ativo</label>
      </div>
    </div>
  </div>
  <div class="card-footer bg-white d-flex gap-2">
    <button class="btn btn-primary"><i class="bi bi-check-lg"></i> Salvar</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('profissionais.listar') }}">Cancelar</a>
  </div>
</form>
{% endblock %}
